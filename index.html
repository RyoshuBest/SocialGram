<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socialgram - Professional Network</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Area Autenticazione -->
        <div id="auth-container">
            <h1>Socialgram</h1>
            <div id="login-form">
                <input type="text" id="username" placeholder="Username">
                <input type="password" id="password" placeholder="Password">
                <button onclick="handleLogin()">Accedi</button>
                <button onclick="handleRegister()" class="secondary">Registrati</button>
            </div>
        </div>

        <!-- Area Feed Principale (Nascosta inizialmente) -->
        <div id="main-feed" style="display:none;">
            <nav>
                <h2>Socialgram</h2>
                <button onclick="logout()">Logout</button>
            </nav>
            <div class="create-post">
                <textarea id="post-content" placeholder="Cosa sta succedendo nel tuo mondo professionale?"></textarea>
                <button onclick="createPost()">Pubblica</button>
            </div>
            <div id="posts-container"></div>
        </div>
    </div>
    <script src="db.js"></script>
    <script src="script.js"></script>
</body>
</html>
